name: Smoke test

on:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: [self-hosted, macOS, X64, iMac-Pro, native-object-tools-release]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Confirm working directory
        run: pwd && ls -1

      - name: Confirm Resources folder contents
        run: ls -1 Resources/

      - name: Confirm Examples fixture present
        run: test -f "Examples/1 Corinthians 1.docx" && echo "Fixture found" || echo "FIXTURE MISSING"

      - name: Report runner environment
        run: |
          echo "macOS: $(sw_vers -productVersion)"
          echo "Runner: $RUNNER_NAME"
          echo "Workspace: $GITHUB_WORKSPACE"
